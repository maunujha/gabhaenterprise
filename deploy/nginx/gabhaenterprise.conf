# =====================================================================
# Gabha Enterprise — nginx vhost (gabhaenterprise.com)
# Isolated from urbanflaky.conf. Reuses PHP 8.3-FPM socket only.
# Install to /etc/nginx/sites-available/ and symlink into sites-enabled.
# The TLS certificate is issued separately by certbot (see deploy/README).
# =====================================================================

# --- HTTP → HTTPS (apex + www) ---------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name gabhaenterprise.com www.gabhaenterprise.com;

    # Allow ACME renewals over HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/gabhaenterprise/public;
    }

    location / {
        return 301 https://gabhaenterprise.com$request_uri;
    }
}

# --- HTTPS www → apex (canonical host = apex) ------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gabhaenterprise.com;

    ssl_certificate     /etc/letsencrypt/live/gabhaenterprise.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gabhaenterprise.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://gabhaenterprise.com$request_uri;
}

# --- HTTPS apex — the site -------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gabhaenterprise.com;

    root /var/www/gabhaenterprise/public;
    index index.php;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/gabhaenterprise.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gabhaenterprise.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers (applied to all responses) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    client_max_body_size 12m;

    # --- gzip ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml application/rss+xml;

    # --- App routing ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-cache immutable/versioned assets (no add_header → security headers still inherited).
    location ^~ /build/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }
    location ^~ /fonts/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }
    location ~* \.(?:css|js|png|jpe?g|gif|webp|svg|ico|woff2)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt   { access_log off; log_not_found off; }
    location = /favicon.svg  { access_log off; log_not_found off; }
    location = /favicon.ico  { access_log off; log_not_found off; }

    # --- PHP ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 60s;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny hidden files except ACME.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
